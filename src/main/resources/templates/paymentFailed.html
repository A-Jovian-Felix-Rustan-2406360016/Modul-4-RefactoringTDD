<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Payment Failed</title></head>
<body>
<h1 style="color: red;">Payment Rejected!</h1>
<p>Sorry, your payment for Order ID: <span th:text="${payment.order.id}"></span> could not be processed.</p>
<p>Reason: Data provided is invalid for method <span th:text="${payment.method}"></span>.</p>

<a th:href="@{/order/list}">Back to Order List</a>
<a th:href="@{/order/pay/{id}(id=${payment.order.id})}">Try Again</a>
</body>
</html>
