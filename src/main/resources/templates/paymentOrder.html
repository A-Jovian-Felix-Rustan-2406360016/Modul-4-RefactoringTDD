<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Pay Order</title></head>
<body>
<h1>Payment for Order</h1>
<p>Order ID: <span th:text="${order.id}"></span></p>

<form th:action="@{/order/pay/{id}(id=${order.id})}" method="post">
    <label>Payment Method:</label>
    <select name="method" id="method" onchange="toggleFields()">
        <option value="VOUCHER">Voucher</option>
        <option value="BANK_TRANSFER">Bank Transfer</option>
    </select>

    <div id="voucherField">
        <p>Voucher Code:</p>
        <input type="text" name="paymentData['voucherCode']" placeholder="ESHOP123456789012">
    </div>

    <div id="bankField" style="display:none;">
        <p>Bank Name:</p>
        <input type="text" name="paymentData['bankName']">
    </div>

    <button type="submit" style="margin-top: 10px;">Confirm Payment</button>
</form>

<script>
    function toggleFields() {
        const method = document.getElementById('method').value;
        document.getElementById('voucherField').style.display = method === 'VOUCHER' ? 'block' : 'none';
        document.getElementById('bankField').style.display = method === 'BANK_TRANSFER' ? 'block' : 'none';
    }
</script>
</body>
</html>
